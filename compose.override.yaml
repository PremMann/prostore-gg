services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    command: npm run dev
    environment:
      # Override DATABASE_URL to connect to the local db service
      DATABASE_URL: 
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - db

volumes:
  postgres_data:
  node_modules:
